name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: github.repository != 'qwibitai/nanoclaw'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: false
          script: |
            set -e
            cd /opt/betty

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Installing dependencies and building ==="
            if ! (npm ci && npm run build); then
              echo "BUILD_FAILED=true" >> /tmp/deploy_result
              echo "::error::Build failed — attempting rollback"
              git reset --hard HEAD~1
              if npm ci && npm run build; then
                systemctl restart betty
                echo "ROLLBACK_OK=true" >> /tmp/deploy_result
              else
                echo "ROLLBACK_FAILED=true" >> /tmp/deploy_result
              fi
              exit 1
            fi

            echo "=== Restarting service ==="
            systemctl restart betty

            echo "=== Healthcheck ==="
            sleep 5
            LOGS=$(journalctl -u betty -n 20 --no-pager)
            echo "$LOGS"
            if echo "$LOGS" | grep -q "ERROR"; then
              echo "HEALTHCHECK_FAILED=true" >> /tmp/deploy_result
              exit 1
            fi

            echo "DEPLOY_OK=true" >> /tmp/deploy_result

      - name: Check deploy result
        if: failure()
        id: check_result
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/vps_key
          chmod 600 /tmp/vps_key
          RESULT=$(ssh -i /tmp/vps_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "cat /tmp/deploy_result 2>/dev/null; rm -f /tmp/deploy_result")
          rm -f /tmp/vps_key
          echo "$RESULT"
          if echo "$RESULT" | grep -q "ROLLBACK_FAILED\|HEALTHCHECK_FAILED"; then
            echo "needs_issue=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue on deployment failure
        if: failure() && steps.check_result.outputs.needs_issue == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            async function createOrCommentIssue(github, owner, repo, label, title, body) {
              const { data: existing } = await github.rest.issues.listForRepo({
                owner, repo, labels: label, state: 'open'
              });
              if (existing.length > 0) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: existing[0].number,
                  body: `**재발 (${new Date().toISOString()}):**\n\n${body}`
                });
              } else {
                await github.rest.issues.create({
                  owner, repo, title, body, labels: [label]
                });
              }
            }

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commit = context.sha.slice(0, 7);

            const body = [
              `VPS 자동 배포가 실패했습니다.`,
              '',
              `- **커밋**: \`${commit}\``,
              `- **브랜치**: \`${context.ref}\``,
              `- **실행 로그**: ${runUrl}`,
              '',
              '수동 복구 절차:',
              '```bash',
              '# VPS에 SSH 접속 후:',
              'cd /opt/betty && git log --oneline -5',
              'npm run build && systemctl restart betty',
              '```',
            ].join('\n');

            await createOrCommentIssue(
              github,
              context.repo.owner,
              context.repo.repo,
              'deployment-failure',
              `배포 실패 — ${commit}`,
              body
            );
